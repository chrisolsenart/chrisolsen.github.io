
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name</title>
  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      background: white;
      color: black;
    }

    .container {
      padding: 40px;
      max-width: 800px;
    }

    a {
      color: black;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav a {
      display: block;
      margin-bottom: 10px;
    }

    .section {
      display: none;
      margin-top: 40px;
    }

    .active {
      display: block;
    }

    h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
    }
    .gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 20px;
}

.gallery img {
  width: 100%;
  height: auto;
  display: block;
}
  </style>
</head>
<body>

<div class="container">
  <div class="nav">
    <h1>Chris Olsen</h1>
    <a href="#" onclick="showSection('music')">Music</a>
    <a href="#" onclick="showSection('visual')">Visual Art</a>
    <a href="#" onclick="showSection('cv')">CV</a>
  </div>

<div class="gallery">
  <img src="image1.jpg" alt="">
  <img src="image2.jpg" alt="">
  <img src="image3.jpg" alt="">
</div>
    <p>Music projects, recordings, or embedded players go here.</p>
  </div>

<div id="visual" class="section">

  <h2>My Galveston</h2>
  <div class="gallery">
    <img src="Chris Olsen, Untitled.png" alt="">
    <img src="Chris Olsen, Tree.png" alt="">
  </div>
  
    <h2>The Secret</h2>
  <div class="gallery">
    <img src="secret_1.jpg" alt="">
    <img src="secret_2.jpg" alt="">
  </div>

</div>

  <div id="cv" class="section">
    <p>Your CV, exhibitions, performances, and experience go here.</p>
  </div>
</div>

<script>
  function showSection(sectionId) {
    const sections = document.querySelectorAll('.section');
    sections.forEach(section => section.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
  }
</script>

</body>
</html>
