
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name</title>
  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      background: white;
      color: black;
    }

    .container {
      padding: 40px;
      max-width: 800px;
    }

    a {
      color: black;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav a {
      display: block;
      margin-bottom: 10px;
    }

    .section {
      display: none;
      margin-top: 40px;
    }

    .active {
      display: block;
    }

    h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="nav">
    <h1>Your Name</h1>
    <a href="#" onclick="showSection('music')">Music</a>
    <a href="#" onclick="showSection('visual')">Visual Art</a>
    <a href="#" onclick="showSection('cv')">CV</a>
  </div>

  <div id="music" class="section active">
    <p>Music projects, recordings, or embedded players go here.</p>
  </div>

  <div id="visual" class="section">
    <p>Images or descriptions of your visual art go here.</p>
  </div>

  <div id="cv" class="section">
    <p>Your CV, exhibitions, performances, and experience go here.</p>
  </div>
</div>

<script>
  function showSection(sectionId) {
    const sections = document.querySelectorAll('.section');
    sections.forEach(section => section.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
  }
</script>

</body>
</html>
