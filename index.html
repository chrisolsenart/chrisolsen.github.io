<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chris Olsen</title>

  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      background: white;
      color: black;
    }

    a {
      color: black;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 10;
    }

    .nav h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 10px;
    }

    .nav a {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
    }

    /* HOME OVERLAY */
    #home-image {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      z-index: 5;
    }

    #home-image img {
      max-width: 320px;
      width: 100%;
      height: auto;
    }

    /* MAIN LAYOUT */
    .container {
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }

    .section {
      display: none;
      margin-top: 80px;
    }

    .section.active {
      display: block;
    }

</html>
