<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chris Olsen</title>

  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      background: white;
      color: black;
    }

    a {
      color: black;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 20;
    }

    .nav h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 10px;
    }

    .nav a {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
    }

    /* HOME IMAGE */
    #home-image {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      z-index: 5;
    }

    #home-image img {
      max-width: 320px;
      width: 100%;
      height: auto;
    }

    /* 🌫️ GIF OVERLAY */
    #home-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 140vw;
      height: 140vh;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.18;
      z-index: 3;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    /* LAYOUT */
    .container {
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .section {
      display: none;
      margin-top: 80px;
    }

    .section.active {
      display: block;
    }

    h1, h2 {
      font-weight: normal;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* MUSIC */
    .music-layout {
      display: flex;
      gap: 40px;
      position: relative;
    }

    .music-left,
    .music-right {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
    }

    iframe {
      width: 100%;
      height: 220px;
      border: none;
      margin-bottom: 20px;
    }

    /* GIF (corner decoration) */
    .music-gif {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 70px;
      height: auto;
      z-index: 5;
      pointer-events: none;
    }

    /* GALLERY */
    .gallery-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .gallery-row img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .container {
        padding: 20px;
      }

      .nav {
        position: static;
        margin-bottom: 20px;
      }

      .gallery-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .music-layout {
        flex-direction: column;
        gap: 20px;
      }

      iframe {
        height: 180px;
      }

      #home-image img {
        max-width: 220px;
      }
    }
  </style>
</head>

<body>

  <!-- 🌫️ FULLSCREEN GIF OVERLAY -->
  <img src="_.gif" id="home-overlay" alt="">

  <!-- NAV -->
  <div class="nav">
    <h1>Chris Olsen</h1>
    <a href="#" onclick="showSection('music'); return false;">Music</a>
    <a href="#" onclick="showSection('visual'); return false;">Visual Art</a>
    <a href="#" onclick="showSection('shows'); return false;">Shows</a>
    <a href="#" onclick="showSection('cv'); return false;">CV</a>
  </div>

  <!-- HOME -->
  <div id="home-image">
    <img src="profile.jpg" alt="Profile" />
  </div>

  <div class="container">

    <!-- MUSIC -->
    <div id="music" class="section active">
      <div class="music-layout">

        <div class="music-left">
          <h2>Albums</h2>
          Dark Ride<br>
          <a href="https://chrisolsen.bandcamp.com/album/dark-ride" target="_blank">stream</a><br><br>

          Sam Cooper/Chris Olsen<br>
          <a href="https://oppasamuelstyle.bandcamp.com/album/sam-cooper-chris-olsen" target="_blank">stream</a><br><br>

          Human! Sound! —> & or the record i could never finish (even if i wanted to)<br>
          <a href="https://vandank.bandcamp.com/album/chris-olsen-human-sound-or-the-record-i-could-never-finish-even-if-i-wanted-to">download</a><br><br>

          <h2>Videos</h2>
          <a href="https://www.youtube.com/watch?v=AFG7LSG9nDM" target="_blank">Lonely Heart (music video)</a><br>
          <a href="https://www.youtube.com/watch?v=30VXdVfeZcc" target="_blank">Live @ Boca del Cielo</a>
        </div>

        <div class="music-right">
          <iframe src="https://www.youtube.com/embed/Gau31hGPytQ?autoplay=1&mute=1&playsinline=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=Gau31hGPytQ"></iframe>

          <iframe src="https://www.youtube.com/embed/eTeD8DAta4c?autoplay=1&mute=1&playsinline=1&controls=0&modestbranding=1&rel=0&loop=1&playlist=eTeD8DAta4c"></iframe>
        </div>

        <img src="dezyne_3d-skeleton-13967.gif" class="music-gif" alt="">

      </div>
    </div>

    <!-- VISUAL -->
    <div id="visual" class="section">
      <h2>My Galveston</h2>

      <div class="gallery-row">
        <img src="brain.JPG" alt="">
        <img src="bunny.JPG" alt="">
      </div>
    </div>

    <!-- SHOWS -->
    <div id="shows" class="section">
      <h2>Upcoming</h2>
    </div>

    <!-- CV -->
    <div id="cv" class="section">
      <h2>CV</h2>
    </div>

  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(section => {
        section.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');

      const home = document.getElementById('home-image');
      const overlay = document.getElementById('home-overlay');

      if (home) home.style.display = 'none';
      if (overlay) overlay.style.opacity = '0';
    }
  </script>

</body>
</html>
