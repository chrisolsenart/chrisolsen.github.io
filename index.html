
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chris Olsen</title>
  <style>
    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      background: white;
      color: black;
    }

 .container {
  padding: 40px;
  max-width: 800px;
  margin: 0 auto;
}

    a {
      color: black;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav a {
      display: block;
      margin-bottom: 10px;
    }

    .section {
      display: none;
      margin-top: 40px;
    }

    .active {
      display: block;
    }

    h1 {
      font-size: 18px;
      font-weight: normal;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
    }
 .gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 50px;
  margin-top: 20px;
}

.gallery img {
  width: 85%;
  max-width: 900px;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* two-image row */
.gallery-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;              /* space BETWEEN images */
  width: 85%;
  max-width: 900px;
  margin: 0 auto;
}

.gallery-row img {
  width: 100%;
  height: auto;
  display: block;
}
    h1, h2, h3, p {
  margin-left: 0;
}

.room h2 {
  margin: 0 0 5px 0;
  font-weight: normal;
}

.room, .nav {
  padding-left: 0;
}
  </style>
</head>
<body>

<div class="container">
  <div class="nav">
    <h1>Chris Olsen</h1>
    <a href="#" onclick="showSection('music')">Music</a>
    <a href="#" onclick="showSection('visual')">Visual Art</a>
    <a href="#" onclick="showSection('cv')">CV</a>
  </div>

<div id="music" class="section">

  <h2>Music</h2>

  <!-- DOWNLOADS -->
  <p>
    Albums<br><br>

    Dark Ride<br>
    <a href="music/album-one.zip">download</a><br><br>

    Human! Sound!<br>
    <a href="music/album-two.zip">download</a>
  </p>

  <br><br>

  <!-- VIDEOS / LINKS -->
  <p>
    Videos / Live<br><br>

    <a href="https://www.youtube.com/watch?v=AFG7LSG9nDM" target="_blank">Lonely Heart</a><br>
    <a href="https://www.youtube.com/watch?v=30VXdVfeZcc&t=107s" target="_blank">live @ boca del cielo 5/26/24
</a><br>
  </p>

  <br><br>

  <!-- OPTIONAL EMBEDS -->
  <p>

    <iframe width="100%" height="200"
      src="https://www.youtube.com/watch?v=eTeD8DAta4c"
      frameborder="0" allowfullscreen>
    </iframe>

  </p>

</div>

<div id="visual" class="section active">

  <h2>My Galveston</h2>
   <div class="gallery-row">
    <img src="_DSC0839.JPG" alt="">
    <img src="_DSC1053.JPG" alt="">
  </div>
    <div class="gallery-row">
    <img src="_DSC1007.JPG" alt="">
    <img src="_DSC1078.JPG" alt="">
  </div>
  
    <h2>The Secret</h2>
  <div class="gallery">
    <img src="secret_1.jpg" alt="">
    <img src="secret_2.jpg" alt="">
  </div>

</div>

  <div id="cv" class="section">
    <p>Your CV, exhibitions, performances, and experience go here.</p>
  </div>
</div>

<script>
  function showSection(sectionId) {
    const sections = document.querySelectorAll('.section');
    sections.forEach(section => section.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
  }
</script>

</body>
</html>
